<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, user-scalable=no">
<title>彩虹电影院 | Rainbow Cinema</title>
<style>
:root{--text:#231942;--muted:#6b6385;--radius:24px}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d0820;color:var(--text);overflow:hidden}

/* ===== Fixed canvas ===== */
.canvas-wrapper{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:960px;height:1709px;overflow:hidden
}
.app{width:960px;height:1709px;position:relative}
.screen{position:absolute;inset:0;display:none;background:url('未命名的设计 (4).png') no-repeat center/cover;padding:16px}
.screen.active{display:block}

.phone-shell{width:520px;margin:0 auto}
.panel{background:rgba(255,255,255,.92);border-radius:var(--radius);padding:16px}
.btn{margin-top:10px;padding:12px;border-radius:999px;background:#7d59d1;color:#fff;border:none}
.result-top{border-radius:24px;padding:16px;background-size:cover;background-position:center}
.result-copy{background:rgba(255,255,255,.92);border-radius:16px;padding:16px;margin-top:10px}
</style>
</head>
<body>

<div class="canvas-wrapper">
<div id="app" class="app">

<section id="cover" class="screen active">
  <div class="phone-shell">
    <div class="panel">
      <h2>彩虹电影院</h2>
      <p>找到最先打动你的故事</p>
      <button class="btn" id="startBtn">开始测试</button>
    </div>
  </div>
</section>

<section id="quiz" class="screen">
  <div class="phone-shell">
    <div class="panel">
      <h3 id="qTitle"></h3>
      <div id="options"></div>
      <button class="btn" id="nextBtn">下一题</button>
    </div>
  </div>
</section>

<section id="result" class="screen">
  <div class="phone-shell">
    <div class="result-top" id="resultBg">
      <div class="result-copy">
        <h2 id="resultTitle"></h2>
        <p id="resultDesc"></p>
        <button class="btn" id="restartBtn">再测一次</button>
      </div>
    </div>
  </div>
</section>

</div>
</div>

<script>
function scalePage(){
  const scale = Math.min(window.innerWidth/960, window.innerHeight/1709);
  document.querySelector('.canvas-wrapper').style.transform=
    `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('load', scalePage);
window.addEventListener('resize', scalePage);

const data=[
 {q:'你最先被什么打动？',opts:['爱情','改变世界','成长','陪伴']}
];

let i=0,ans=[];
const cover=document.getElementById('cover');
const quiz=document.getElementById('quiz');
const result=document.getElementById('result');

function show(el){[cover,quiz,result].forEach(s=>s.classList.remove('active'));el.classList.add('active')}

function render(){
 const q=data[i];
 document.getElementById('qTitle').innerText=q.q;
 const box=document.getElementById('options');
 box.innerHTML='';
 q.opts.forEach((o,idx)=>{
   const div=document.createElement('div');
   div.innerText=o;
   div.style.padding='10px';
   div.style.margin='8px 0';
   div.style.background='#fff';
   div.onclick=()=>{ans.push(idx);next()};
   box.appendChild(div);
 });
}

function next(){
 i++;
 if(i>=data.length){showRes()}else render();
}

function showRes(){
 show(result);
 const map=[
  {t:'LOVE-R',d:'纯爱战士',bg:'LOVE-R.png'},
  {t:'VOIC-E',d:'人权斗士',bg:'VOIC-E.png'},
  {t:'SEED-S',d:'成长小孩',bg:'SEED-S.png'},
  {t:'ALLY-S',d:'支持者',bg:'ALLY-S.png'}
 ];
 const r=map[ans[0]];
 document.getElementById('resultTitle').innerText=r.t;
 document.getElementById('resultDesc').innerText=r.d;
 document.getElementById('resultBg').style.backgroundImage=`url('${r.bg}')`;
}

document.getElementById('startBtn').onclick=()=>{show(quiz);render()};
document.getElementById('nextBtn').onclick=next;
document.getElementById('restartBtn').onclick=()=>location.reload();
</script>

</body>
</html>
